name: "\U0001F41B Bug Report"
description: Report a problem with MusicSeerr
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please search [existing issues](https://github.com/habirabbu/musicseerr/issues) to check if it's already been reported.

        For general support questions, use [Discord](https://discord.gg/f98bFfsPuB) instead.
  - type: input
    id: version
    attributes:
      label: MusicSeerr Version
      description: Found in Settings or the bottom of the sidebar.
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output from `docker compose logs musicseerr`. This will be formatted as code automatically.
      render: shell
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Docker CLI
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: e.g. Chrome 120, Firefox 121, Safari 17
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other details that might help (integrations in use, host OS, Docker version, etc).
  - type: checkboxes
    id: search-existing
    attributes:
      label: Duplicate check
      options:
        - label: I have searched existing issues and this hasn't been reported before.
          required: true
