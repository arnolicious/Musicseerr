[tool.black]
line-length = 100
target-version = ["py313"]
skip-string-normalization = false
color = true

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
combine_as_imports = true
line_length = 100
known_first_party = ["backend"]
default_section = "THIRDPARTY"

[tool.ruff]
# Keep this aligned with Black/isort
target-version = "py313"
src = ["backend"]

[tool.ruff.lint]
select = ["BLE001"]
